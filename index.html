<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Label Manager</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f0f13;color:#e8e8f0;font-family:sans-serif;font-size:13px}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:#3a3a4a;border-radius:3px}
@keyframes spin{to{transform:rotate(360deg)}}
#header{background:#1a1a24;border-bottom:1px solid #2a2a3a;padding:10px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
#tabs{display:flex;gap:1px;padding:8px 16px 0;background:#15151f;border-bottom:1px solid #2a2a3a;flex-wrap:wrap}
#content{padding:16px}
.tab-btn{padding:6px 12px;border:none;border-radius:6px 6px 0 0;cursor:pointer;font-size:11px;font-weight:600;background:transparent;color:#888;transition:all .15s;position:relative}
.tab-btn.active{background:#a855f7;color:#fff}
.tab-btn.trash-tab{color:#f59e0b}
.tab-btn.trash-tab.active{background:#b45309}
.tab-badge{position:absolute;top:2px;right:1px;background:#ef4444;border-radius:50%;width:13px;height:13px;font-size:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700}
.btn{padding:5px 12px;border-radius:7px;border:none;cursor:pointer;background:#2a2a3a;color:#aaa;font-size:11px;font-weight:600}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-primary{background:#a855f7;color:#fff}
.btn-danger{background:#3a1a1a;color:#ef4444}
.btn-sm{padding:2px 8px;font-size:10px}
.btn-green{background:#14532d;color:#22c55e}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:8px 10px;background:#1a1a24;color:#777;font-weight:600;border-bottom:1px solid #2a2a3a;white-space:nowrap;font-size:11px;cursor:pointer;user-select:none}
th:hover{color:#a855f7}
th.active-sort{color:#a855f7}
td{padding:8px 10px;border-bottom:1px solid #1e1e2a;vertical-align:middle;font-size:12px}
tr:hover td{background:#1e1e28}
.card{background:#1a1a24;border:1px solid #2a2a3a;border-radius:10px;padding:14px}
.kpi-card{background:#1a1a24;border-radius:10px;padding:14px 16px;flex:1;min-width:100px;cursor:pointer;border:1px solid #2a2a3a}
.kpi-label{font-size:9px;color:#777;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.kpi-value{font-size:17px;font-weight:700}
.kpi-sub{font-size:9px;color:#666;margin-top:2px}
.badge{padding:2px 6px;border-radius:4px;font-size:10px;font-weight:600;white-space:nowrap}
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.empty{text-align:center;color:#555;padding:40px 0;font-size:13px}
.search-wrap{position:relative;flex:1;max-width:260px}
.search-wrap input{width:100%;padding:5px 10px 5px 26px;background:#0f0f13;border:1px solid #2a2a3a;border-radius:7px;color:#e8e8f0;font-size:11px}
.search-icon{position:absolute;left:8px;top:50%;transform:translateY(-50%);color:#555;font-size:11px;pointer-events:none}
input,select{background:#0f0f13;border:1px solid #2a2a3a;border-radius:7px;color:#e8e8f0;padding:6px 9px;font-size:12px;width:100%}
input:focus,select:focus{outline:none;border-color:#a855f7}
.modal-overlay{position:fixed;inset:0;background:#000a;display:flex;align-items:center;justify-content:center;z-index:100}
.modal-box{background:#1a1a24;border:1px solid #2a2a3a;border-radius:12px;padding:22px;width:400px;max-width:95vw;max-height:90vh;overflow-y:auto}
.form-field{margin-bottom:10px}
.form-field label{display:block;font-size:10px;color:#888;margin-bottom:3px}
.checkbox-label{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:12px}
.checkbox-label input{width:14px;height:14px;flex-shrink:0}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);padding:8px 20px;border-radius:9px;font-weight:700;font-size:12px;z-index:200;box-shadow:0 4px 16px #0007;white-space:nowrap;display:none}
.filter-btn{padding:3px 10px;border:none;border-radius:5px;cursor:pointer;font-size:10px;font-weight:600;background:#2a2a3a;color:#888}
.filter-btn.active{background:#a855f7;color:#fff}
.bar-wrap{display:flex;align-items:center;gap:6px}
.bar-bg{background:#2a2a3a;border-radius:3px;height:5px;flex:1}
.bar-fill{border-radius:3px;height:5px}
.check-btn{width:22px;height:22px;border-radius:4px;border:2px solid #3a3a4a;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#22c55e;font-size:11px;flex-shrink:0}
.check-btn.checked{border-color:#22c55e;background:#14532d}
</style>
</head>
<body>

<div id="header">
  <div style="width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#a855f7,#ec4899);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0">🎵</div>
  <span style="font-weight:700;font-size:15px;letter-spacing:1px">Label Manager</span>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input id="searchInput" placeholder="全体を検索..." oninput="onSearch(this.value)">
  </div>
  <div style="margin-left:auto;display:flex;gap:5px;flex-wrap:wrap">
    <button class="btn" id="undoBtn" onclick="undo()" disabled>↩ 元に戻す</button>
    <button class="btn" onclick="exportCSV()">⬇ CSV</button>
    <button class="btn" style="color:#38bdf8" onclick="exportJSON()">💾 バックアップ</button>
    <button class="btn" style="color:#22c55e" onclick="importJSON()">📂 復元</button>
  </div>
</div>

<div id="tabs"></div>
<div id="content"></div>
<div id="toast"></div>

<script>
const TODAY = new Date().toISOString().slice(0,10);
const SK = 'lm_v1';
const EXPENSE_CATS = ['製造','宣伝','流通','制作','ライセンス','管理','その他'];
const FORMATS = ['CD','LP','7inch','12inch','カセット','デジタル','その他'];
const WS_TYPES = ['実店舗','EC','配信','卸問屋','その他'];
const PAY_STATUS = ['入金済','未入金','一部入金'];
const TAB_NAMES = ['ダッシュボード','卸先・流通','卸し履歴','入金・売上','在庫・残数','諸経費','収支分析','🗑 ゴミ箱'];

const SEED = {
  wholesalers:[
    {id:1,name:'タワーレコード',type:'実店舗',contact:'tanaka@tower.co.jp',terms:'翌月末',region:'国内',memo:''},
    {id:2,name:'HMV',type:'実店舗',contact:'sales@hmv.co.jp',terms:'60日後',region:'国内',memo:''},
    {id:3,name:'Amazon',type:'EC',contact:'vendor@amazon.co.jp',terms:'翌月15日',region:'国内',memo:''},
  ],
  deliveries:[
    {id:1,date:'2025-01-10',wholesaler:'タワーレコード',artist:'夜想会',title:'1st Album「夜明け」',format:'CD',qty:50,unitPrice:1800,paid:true,memo:''},
    {id:2,date:'2025-01-12',wholesaler:'HMV',artist:'夜想会',title:'1st Album「夜明け」',format:'CD',qty:40,unitPrice:1800,paid:true,memo:''},
    {id:3,date:'2025-01-20',wholesaler:'Amazon',artist:'夜想会',title:'1st Album「夜明け」',format:'CD',qty:60,unitPrice:1700,paid:false,memo:''},
    {id:4,date:'2025-02-05',wholesaler:'タワーレコード',artist:'夜想会',title:'2nd Single「光」',format:'7inch',qty:30,unitPrice:1200,paid:true,memo:''},
    {id:5,date:'2025-02-10',wholesaler:'HMV',artist:'夜想会',title:'2nd Single「光」',format:'7inch',qty:25,unitPrice:1200,paid:false,memo:''},
    {id:6,date:'2025-03-01',wholesaler:'タワーレコード',artist:'夜想会',title:'1st Album「夜明け」',format:'LP',qty:20,unitPrice:3500,paid:false,memo:''},
  ],
  payments:[
    {id:1,date:'2025-01-15',from:'タワーレコード',title:'1st Album 委託精算',amount:85000,status:'入金済',dueDate:'2025-01-31',memo:''},
    {id:2,date:'2025-02-28',from:'Amazon',title:'配信ロイヤリティ',amount:32000,status:'入金済',dueDate:'2025-02-28',memo:''},
    {id:3,date:'2025-03-31',from:'HMV',title:'2月分精算',amount:41000,status:'未入金',dueDate:'2025-03-31',memo:''},
  ],
  inventory:[
    {id:1,artist:'夜想会',title:'1st Album「夜明け」',format:'CD',total:300,returned:5,releaseDate:'2024-11-01',barcode:'4942463511234',memo:''},
    {id:2,artist:'夜想会',title:'2nd Single「光」',format:'7inch',total:200,returned:0,releaseDate:'2025-01-20',barcode:'4942463511235',memo:''},
    {id:3,artist:'夜想会',title:'1st Album「夜明け」',format:'LP',total:100,returned:2,releaseDate:'2024-11-01',barcode:'4942463511236',memo:''},
  ],
  expenses:[
    {id:1,date:'2025-01-10',category:'製造',detail:'CDプレス代',amount:180000,paid:true,artist:'夜想会',title:'1st Album「夜明け」',memo:''},
    {id:2,date:'2025-01-20',category:'宣伝',detail:'SNS広告',amount:30000,paid:true,artist:'夜想会',title:'',memo:''},
    {id:3,date:'2025-02-05',category:'流通',detail:'配送・梱包費',amount:12000,paid:true,artist:'',title:'',memo:''},
    {id:4,date:'2025-02-15',category:'制作',detail:'マスタリング費',amount:55000,paid:false,artist:'夜想会',title:'2nd Single「光」',memo:''},
  ],
};

let state = JSON.parse(localStorage.getItem(SK) || 'null') || deepCopy(SEED);
let trash = [];
let past = [];
let editLog = [];
let currentTab = 0;
let searchQ = '';
let sortState = {};
let deliveryFilter = 'すべて';

function deepCopy(o){ return JSON.parse(JSON.stringify(o)); }
function save(){ localStorage.setItem(SK, JSON.stringify(state)); }
function snapshot(){ past = [...past.slice(-49), deepCopy(state)]; updateUndoBtn(); }
function updateUndoBtn(){ document.getElementById('undoBtn').disabled = past.length === 0; }

function undo(){
  if(!past.length) return;
  state = past.pop();
  save(); updateUndoBtn(); render();
  showToast('元に戻しました', '#a855f7');
}

function onSearch(v){ searchQ = v.toLowerCase(); render(); }

const fmt = n => Number(n).toLocaleString('ja-JP');

function calcStock(inv){
  const dq = state.deliveries
    .filter(d => d.artist===inv.artist && d.title===inv.title && d.format===inv.format)
    .reduce((s,d)=>s+Number(d.qty),0);
  return Number(inv.total) - dq + Number(inv.returned);
}

function filterRows(rows, keys){
  if(!searchQ) return rows;
  return rows.filter(r => keys.some(k => String(r[k]||'').toLowerCase().includes(searchQ)));
}

function sortRows(rows, key, numKeys=[]){
  if(!key) return rows;
  const dir = sortState[key] || 'asc';
  return [...rows].sort((a,b)=>{
    let av=a[key], bv=b[key];
    if(numKeys.includes(key)){av=Number(av);bv=Number(bv);}
    if(av==null) return 1; if(bv==null) return -1;
    const c = typeof av==='number' ? av-bv : String(av).localeCompare(String(bv),'ja');
    return dir==='asc' ? c : -c;
  });
}

function toggleSort(key){
  sortState[key] = sortState[key]==='asc' ? 'desc' : 'asc';
  render();
}

function th(label, key, numKeys=[]){
  const dir = sortState[key];
  const arrow = dir ? (dir==='asc'?'▲':'▼') : '⇅';
  const active = dir ? 'active-sort' : '';
  return `<th class="${active}" onclick="toggleSort('${key}')">${label}<span style="margin-left:3px;font-size:9px;opacity:${dir?1:0.3}">${arrow}</span></th>`;
}

function badge(text, bg, color){
  return `<span class="badge" style="background:${bg};color:${color}">${text}</span>`;
}

function showToast(msg, color='#22c55e'){
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.background = color; t.style.display = 'block';
  setTimeout(()=>{ t.style.display='none'; }, 2500);
}

function nextId(arr){ return arr.length ? Math.max(...arr.map(x=>x.id))+1 : 1; }

// アーティストに紐づくタイトル一覧を返す
function getTitlesForArtist(artist){
  const titles = [...new Set(state.inventory.filter(i=>i.artist===artist).map(i=>i.title))];
  return titles.length ? titles : ['（在庫登録が必要）'];
}

// 卸し履歴モーダルのアーティスト変更時にタイトルselectを更新
function onDeliveryArtistChange(){
  const artist = document.getElementById('f_artist')?.value;
  const titleSel = document.getElementById('f_title');
  if(!titleSel) return;
  const titles = getTitlesForArtist(artist);
  titleSel.innerHTML = titles.map(t=>`<option value="${t}">${t}</option>`).join('');
}

function renderTabs(){
  const overdue = state.payments.filter(p=>p.status!=='入金済'&&p.dueDate&&p.dueDate<TODAY).length;
  const unpaidExp = state.expenses.filter(e=>!e.paid).length;
  const badges = {3:overdue, 5:unpaidExp, 7:trash.length};
  document.getElementById('tabs').innerHTML = TAB_NAMES.map((name,i)=>{
    const b = badges[i]||0;
    const isTrash = i===7;
    const active = currentTab===i ? 'active' : '';
    const tc = isTrash ? 'trash-tab' : '';
    return `<button class="tab-btn ${active} ${tc}" onclick="setTab(${i})">${name}${b>0?`<span class="tab-badge">${b}</span>`:''}</button>`;
  }).join('');
}

function setTab(i){ currentTab=i; render(); }

function getStats(){
  const totalIncome = state.payments.filter(p=>p.status==='入金済').reduce((s,p)=>s+Number(p.amount),0);
  const pendingIncome = state.payments.filter(p=>p.status!=='入金済').reduce((s,p)=>s+Number(p.amount),0);
  const totalExpense = state.expenses.reduce((s,e)=>s+Number(e.amount),0);
  const profit = totalIncome - totalExpense;
  const totalStock = state.inventory.reduce((s,i)=>s+Math.max(0,calcStock(i)),0);
  const overdue = state.payments.filter(p=>p.status!=='入金済'&&p.dueDate&&p.dueDate<TODAY).length;
  const unpaidDel = state.deliveries.filter(d=>!d.paid);
  const unpaidDelAmt = unpaidDel.reduce((s,d)=>s+d.qty*d.unitPrice,0);
  return {totalIncome,pendingIncome,totalExpense,profit,totalStock,overdue,unpaidDel,unpaidDelAmt};
}

function render(){
  renderTabs();
  const content = document.getElementById('content');
  switch(currentTab){
    case 0: content.innerHTML = renderDashboard(); break;
    case 1: content.innerHTML = renderWholesalers(); break;
    case 2: content.innerHTML = renderDeliveries(); break;
    case 3: content.innerHTML = renderPayments(); break;
    case 4: content.innerHTML = renderInventory(); break;
    case 5: content.innerHTML = renderExpenses(); break;
    case 6: content.innerHTML = renderAnalysis(); break;
    case 7: content.innerHTML = renderTrash(); break;
  }
}

function renderDashboard(){
  const {totalIncome,pendingIncome,totalExpense,profit,totalStock,overdue,unpaidDel,unpaidDelAmt} = getStats();
  const cards = [
    {l:'入金済',v:`¥${fmt(totalIncome)}`,sub:'確定売上',c:'#a855f7',tab:3},
    {l:'未入金',v:`¥${fmt(pendingIncome)}`,sub:overdue>0?`${overdue}件延滞`:'請求中',c:overdue>0?'#ef4444':'#f59e0b',tab:3},
    {l:'卸し未回収',v:`¥${fmt(unpaidDelAmt)}`,sub:`${unpaidDel.length}件`,c:'#f97316',tab:2},
    {l:'経費合計',v:`¥${fmt(totalExpense)}`,sub:'',c:'#ef4444',tab:5},
    {l:'収支',v:`¥${fmt(profit)}`,sub:profit>=0?'黒字':'赤字',c:profit>=0?'#22c55e':'#ef4444',tab:6},
    {l:'在庫残数',v:`${fmt(totalStock)}点`,sub:'',c:'#38bdf8',tab:4},
  ];
  const kpiHtml = cards.map(c=>`
    <div class="kpi-card" style="border-color:${c.c}30" onclick="setTab(${c.tab})">
      <div class="kpi-label">${c.l}</div>
      <div class="kpi-value" style="color:${c.c}">${c.v}</div>
      ${c.sub?`<div class="kpi-sub">${c.sub}</div>`:''}
    </div>`).join('');

  const expByCat = EXPENSE_CATS.map(c=>({c,v:state.expenses.filter(e=>e.category===c).reduce((s,e)=>s+Number(e.amount),0)})).filter(x=>x.v>0);
  const maxExp = Math.max(...expByCat.map(x=>x.v),1);
  const expHtml = expByCat.map(({c,v})=>`
    <div style="margin-bottom:7px">
      <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:2px"><span>${c}</span><span style="color:#ef4444">¥${fmt(v)}</span></div>
      <div style="background:#2a2a3a;border-radius:3px;height:4px"><div style="width:${(v/maxExp)*100}%;background:linear-gradient(90deg,#ef4444,#f97316);border-radius:3px;height:4px"></div></div>
    </div>`).join('');

  const tq = {};
  state.deliveries.forEach(d=>{const k=`${d.artist} / ${d.title}`;tq[k]=(tq[k]||0)+Number(d.qty);});
  const topHtml = Object.entries(tq).sort((a,b)=>b[1]-a[1]).slice(0,4).map(([t,q],i)=>`
    <div style="display:flex;align-items:center;gap:7px;margin-bottom:7px">
      <span style="color:#555;font-weight:700;width:14px;font-size:11px">${i+1}</span>
      <div style="flex:1;font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t}</div>
      <span style="color:#a855f7;font-weight:700;font-size:11px">${fmt(q)}枚</span>
    </div>`).join('');

  const lowStock = state.inventory.filter(i=>calcStock(i)<30);
  const lowHtml = lowStock.length===0
    ? '<div style="color:#555;font-size:11px">残少なし</div>'
    : lowStock.map(i=>`
      <div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #2a2a3a;font-size:11px">
        <div><div style="font-weight:600">${i.artist}</div><div style="color:#666">${i.title}/${i.format}</div></div>
        <span style="color:#ef4444;font-weight:700">${fmt(calcStock(i))}点</span>
      </div>`).join('');

  const urHtml = unpaidDel.length===0
    ? '<div style="color:#555;font-size:11px">未回収なし</div>'
    : unpaidDel.slice(0,4).map(d=>`
      <div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #2a2a3a;font-size:11px">
        <div><div style="font-weight:600">${d.wholesaler}</div><div style="color:#666">${d.date}・${d.qty}枚</div></div>
        <span style="color:#f97316;font-weight:700">¥${fmt(d.qty*d.unitPrice)}</span>
      </div>`).join('');

  return `
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px">${kpiHtml}</div>
    <div style="display:flex;gap:12px;flex-wrap:wrap">
      <div class="card" style="flex:1;min-width:180px"><h4 style="margin:0 0 10px;font-size:11px;color:#888;text-transform:uppercase">経費内訳</h4>${expHtml}</div>
      <div class="card" style="flex:1;min-width:180px"><h4 style="margin:0 0 10px;font-size:11px;color:#888;text-transform:uppercase">卸し Top</h4>${topHtml}</div>
      <div class="card" style="flex:1;min-width:180px;border-color:${lowStock.length?'#f9731633':'#2a2a3a'}"><h4 style="margin:0 0 10px;font-size:11px;color:${lowStock.length?'#f97316':'#888'};text-transform:uppercase">⚠ 在庫残少</h4>${lowHtml}</div>
      <div class="card" style="flex:1;min-width:180px;border-color:${unpaidDel.length?'#f9731633':'#2a2a3a'}"><h4 style="margin:0 0 10px;font-size:11px;color:#f97316;text-transform:uppercase">卸し未回収</h4>${urHtml}</div>
    </div>`;
}

function renderWholesalers(){
  let rows = sortRows(filterRows(state.wholesalers,['name','type','region','contact']), 'name');
  const tbody = rows.map(w=>{
    const wd = state.deliveries.filter(d=>d.wholesaler===w.name);
    const qty = wd.reduce((s,d)=>s+Number(d.qty),0);
    const ua = wd.filter(d=>!d.paid).reduce((s,d)=>s+d.qty*d.unitPrice,0);
    return `<tr>
      <td><b>${w.name}</b></td>
      <td>${badge(w.type,'#2a2a3a','#aaa')}</td>
      <td style="color:#888">${w.region}</td>
      <td style="color:#888;font-size:11px">${w.contact}</td>
      <td>${w.terms}</td>
      <td style="color:#38bdf8;font-weight:700">${fmt(qty)}枚</td>
      <td style="color:${ua>0?'#f97316':'#22c55e'};font-weight:700">${ua>0?'¥'+fmt(ua):'なし'}</td>
      <td><button class="btn btn-sm" onclick="openModal('ws',${w.id})">編集</button> <button class="btn btn-sm btn-danger" onclick="deleteItem('wholesalers',${w.id})">削除</button></td>
    </tr>`;
  }).join('');
  return `
    <div class="section-header"><h3 style="font-size:13px;color:#aaa">卸先・流通（${rows.length}件）</h3><button class="btn btn-primary" onclick="openModal('ws')">＋ 追加</button></div>
    <div class="tbl-wrap"><table><thead><tr>${th('卸先名','name')}${th('種別','type')}${th('地域','region')}${th('連絡先','contact')}${th('支払条件','terms')}<th>総卸し枚数</th><th>未回収</th><th></th></tr></thead><tbody>${tbody}</tbody></table></div>`;
}

function renderDeliveries(){
  let rows = state.deliveries;

let analysisView = 'title';
function setAnalysisView(v){ analysisView=v; render(); }

function renderAnalysis(){
  const titleKeys = [];
  state.inventory.forEach(i=>{
    const k=`${i.artist}__${i.title}`;
    if(!titleKeys.find(x=>x.k===k)) titleKeys.push({k,artist:i.artist,title:i.title});
  });
  const artists = [...new Set(state.inventory.map(i=>i.artist).filter(Boolean))];

  const calcRow = (filter) => {
    const dPaid = state.deliveries.filter(d=>d.paid&&filter(d)).reduce((s,d)=>s+d.qty*d.unitPrice,0);
    const dAmt  = state.deliveries.filter(filter).reduce((s,d)=>s+d.qty*d.unitPrice,0);
    const dQty  = state.deliveries.filter(filter).reduce((s,d)=>s+Number(d.qty),0);
    const exp   = state.expenses.filter(filter).reduce((s,e)=>s+Number(e.amount),0);
    return {dPaid,dAmt,dQty,exp,profit:dPaid-exp};
  };

  const rows = analysisView==='title'
    ? titleKeys.map(({k,artist,title})=>({name:`${artist} / ${title}`, ...calcRow(x=>x.title===title&&x.artist===artist)}))
    : artists.map(a=>({name:a, ...calcRow(x=>x.artist===a)}));

  const maxAmt = Math.max(...rows.map(r=>Math.max(r.dPaid,r.exp)),1);
  const cards = rows.map(r=>`
    <div class="card" style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:6px;margin-bottom:10px">
        <div>
          <div style="font-weight:700;font-size:12px;margin-bottom:2px">${r.name}</div>
          <div style="font-size:10px;color:#666">卸し${fmt(r.dQty)}枚 / 卸し金額 ¥${fmt(r.dAmt)}</div>
        </div>
        <div style="display:flex;gap:10px;flex-wrap:wrap">
          <div style="text-align:right"><div style="font-size:9px;color:#777">売上(回収済)</div><div style="font-size:14px;font-weight:700;color:#a855f7">¥${fmt(r.dPaid)}</div></div>
          <div style="text-align:right"><div style="font-size:9px;color:#777">経費</div><div style="font-size:14px;font-weight:700;color:#ef4444">¥${fmt(r.exp)}</div></div>
          <div style="text-align:right"><div style="font-size:9px;color:#777">収支</div><div style="font-size:14px;font-weight:700;color:${r.profit>=0?'#22c55e':'#ef4444'}">¥${fmt(r.profit)}</div></div>
        </div>
      </div>
      <div class="bar-wrap" style="margin-bottom:4px"><span style="font-size:10px;color:#888;width:50px">売上</span><div class="bar-bg"><div class="bar-fill" style="width:${Math.min((r.dPaid/maxAmt)*100,100)}%;background:#a855f7"></div></div></div>
      <div class="bar-wrap"><span style="font-size:10px;color:#888;width:50px">経費</span><div class="bar-bg"><div class="bar-fill" style="width:${Math.min((r.exp/maxAmt)*100,100)}%;background:#ef4444"></div></div></div>
    </div>`).join('');

  const btns = ['title','artist'].map(v=>`<button class="filter-btn ${analysisView===v?'active':''}" onclick="setAnalysisView('${v}')">${v==='title'?'作品別':'アーティスト別'}</button>`).join('');
  return `<div style="margin-bottom:14px">${btns}</div>${rows.length===0?'<div class="empty">データがありません</div>':cards}`;
}

    const rows = editLog.map(e=>`<tr>
      <td style="color:#555;font-size:10px;white-space:nowrap">${e.at}</td>
      <td>${badge(e.type,'#1e1a2a','#a855f7')}</td>
      <td style="font-size:11px;color:#ef4444">${e.desc}</td>

      ${editLog.length===0?'<div class="empty">編集履歴はありません</div>':

  }

  const items = trash.length===0 ? '<div class="empty">ゴミ箱は空です</div>'
    : trash.map(t=>`
      <div class="card" style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
        <div style="flex:1">
          <div style="display:flex;gap:6px;margin-bottom:3px">${badge(t.type,'#2a1a00','#f59e0b')}<span style="font-size:10px;color:#555">${t.deletedAt}</span></div>
          <div style="font-size:11px;color:#bbb">${t.desc}</div>
        </div>
        <button class="btn btn-sm btn-green" onclick="restoreItem(${t.id})">復元</button>

  return `<div style="display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap">${btns}</div>${items}`;

function deleteItem(type, id){
  snapshot();
  const item = state[type].find(x=>x.id===id);
  if(!item) return;
  const descMap = {
    wholesalers: i=>`${i.name}（${i.type}）`,
    deliveries:  i=>`${i.date} ${i.wholesaler} ${i.artist}-${i.title} ${fmt(i.qty)}枚`,
    payments:    i=>`${i.date} ${i.from} ¥${fmt(i.amount)} ${i.status}`,
    inventory:   i=>`${i.artist}/${i.title} ${i.format} 製造${fmt(i.total)}枚`,
    expenses:    i=>`${i.date} ${i.category}/${i.detail} ¥${fmt(i.amount)}`,
  };
  trash.unshift({id:Date.now(), type, item:deepCopy(item), deletedAt:new Date().toLocaleString('ja-JP'), desc:descMap[type]?.(item)||''});
  state[type] = state[type].filter(x=>x.id!==id);
  save(); render(); showToast('ゴミ箱に移動しました','#f59e0b');
}

function restoreItem(tid){
  const entry = trash.find(x=>x.id===tid);
  if(!entry) return;
  snapshot();
  state[entry.type].push(entry.item);
  trash = trash.filter(x=>x.id!==tid);
  save(); render(); showToast('復元しました ✓');
}

function deleteFromTrash(tid){ trash=trash.filter(x=>x.id!==tid); render(); }
function emptyTrash(){ trash=[]; render(); }

function togglePaid(id){
  snapshot();
  const del = state.deliveries.find(x=>x.id===id);
  if(!del) return;
  const newPaid = !del.paid;
  del.paid = newPaid;

  if(newPaid){
    if(!state.payments.some(p=>p.sourceDeliveryId===id)){
      state.payments.push({
        id: nextId(state.payments),
        date: TODAY,
        from: del.wholesaler,
        title: `${del.artist} / ${del.title}（${del.format}）卸し精算`,
        amount: del.qty * del.unitPrice,
        status: '入金済',
        dueDate: TODAY,
        memo: '卸し履歴から自動生成',
        sourceDeliveryId: id,
      });
    }
  } else {
    state.payments = state.payments.filter(p=>p.sourceDeliveryId!==id);
  }
  save(); render(); showToast('入金状況を更新しました ✓');
}

let modalType = null;
let modalId = null;

function openModal(type, id=null){
  modalType=type; modalId=id;
  const typeMap = {ws:'wholesalers',del:'deliveries',pay:'payments',inv:'inventory',exp:'expenses'};
  const labelMap = {ws:'卸先',del:'卸し履歴',pay:'入金・売上',inv:'在庫',exp:'経費'};
  const item = id ? state[typeMap[type]].find(x=>x.id===id) : null;
  const artists = [...new Set(state.inventory.map(i=>i.artist).filter(Boolean))];
  const atMap = {};
  state.inventory.forEach(i=>{ if(i.artist){ atMap[i.artist]=atMap[i.artist]||[]; if(!atMap[i.artist].includes(i.title)) atMap[i.artist].push(i.title); } });

  const selOpts = (opts,val) => opts.map(o=>`<option value="${o}" ${o===val?'selected':''}>${o}</option>`).join('');
  const inp = (l,k,v,t='text') => `<div class="form-field"><label>${l}</label><input type="${t}" id="f_${k}" value="${v||''}"></div>`;
  const sel = (l,k,v,opts) => `<div class="form-field"><label>${l}</label><select id="f_${k}">${selOpts(opts,v)}</select></div>`;
  const chk = (l,k,v) => `<div class="form-field"><label class="checkbox-label"><input type="checkbox" id="f_${k}" ${v?'checked':''}><span>${l}</span></label></div>`;

  let fields = '';
  if(type==='ws'){
    fields = inp('卸先名','name',item?.name)+sel('種別','type',item?.type,WS_TYPES)+inp('地域','region',item?.region)+inp('連絡先','contact',item?.contact)+inp('支払条件','terms',item?.terms)+inp('メモ','memo',item?.memo);
  } else if(type==='del'){
    // アーティストの初期値を決定
    const initArtist = item?.artist || artists[0] || '';
    // その初期アーティストのタイトル一覧
    const initTitles = getTitlesForArtist(initArtist);

    // アーティストselectにonchange、タイトルselectはinitTitlesで生成
    const artistSelHtml = `
      <div class="form-field">
        <label>アーティスト</label>
        <select id="f_artist" onchange="onDeliveryArtistChange()">
          ${artists.map(a=>`<option value="${a}" ${a===initArtist?'selected':''}>${a}</option>`).join('')}
        </select>
      </div>`;
    const titleSelHtml = `
      <div class="form-field">
        <label>タイトル</label>
        <select id="f_title">
          ${initTitles.map(t=>`<option value="${t}" ${t===item?.title?'selected':''}>${t}</option>`).join('')}
        </select>
      </div>`;

    fields = inp('卸し日','date',item?.date||TODAY,'date')
      + sel('卸先','wholesaler',item?.wholesaler,state.wholesalers.map(w=>w.name))
      + artistSelHtml
      + titleSelHtml
      + sel('形態','format',item?.format,FORMATS)
      + inp('枚数','qty',item?.qty,'number')
      + inp('単価（円）','unitPrice',item?.unitPrice,'number')
      + chk('入金済み','paid',item?.paid)
      + inp('メモ','memo',item?.memo);
  } else if(type==='pay'){
    fields = inp('日付','date',item?.date||TODAY,'date')+sel('入金元','from',item?.from,state.wholesalers.map(w=>w.name))+inp('件名','title',item?.title)+inp('金額（円）','amount',item?.amount,'number')+sel('ステータス','status',item?.status,PAY_STATUS)+inp('入金期限','dueDate',item?.dueDate,'date')+inp('メモ','memo',item?.memo);
  } else if(type==='inv'){
    fields = inp('アーティスト','artist',item?.artist)+inp('タイトル','title',item?.title)+sel('形態','format',item?.format,FORMATS)+inp('発売日','releaseDate',item?.releaseDate,'date')+inp('製造数','total',item?.total,'number')+inp('返品数','returned',item?.returned||0,'number')+inp('バーコード','barcode',item?.barcode)+inp('メモ','memo',item?.memo);
  } else if(type==='exp'){
    fields = inp('日付','date',item?.date||TODAY,'date')+sel('カテゴリ','category',item?.category,EXPENSE_CATS)+inp('内容','detail',item?.detail)+inp('金額（円）','amount',item?.amount,'number')+chk('支払済み','paid',item?.paid)+sel('アーティスト（任意）','artist',item?.artist||'',['',...artists])+inp('タイトル（任意）','title',item?.title)+inp('メモ','memo',item?.memo);
  }

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'modalOverlay';
  overlay.onclick = e=>{ if(e.target===overlay) closeModal(); };
  overlay.innerHTML = `
    <div class="modal-box">
      <h3 style="margin:0 0 14px;font-size:13px">${item?'編集':'追加'} — ${labelMap[type]}</h3>
      ${fields}
      <div style="display:flex;gap:6px;justify-content:flex-end;margin-top:14px">
        <button class="btn" onclick="closeModal()">キャンセル</button>
        <button class="btn btn-primary" onclick="saveModal()">保存</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
}

function closeModal(){
  const o = document.getElementById('modalOverlay');
  if(o) o.remove();
}

function g(k){ const el=document.getElementById('f_'+k); if(!el)return''; return el.type==='checkbox'?el.checked:el.value; }

function saveModal(){
  snapshot();
  const typeMap = {ws:'wholesalers',del:'deliveries',pay:'payments',inv:'inventory',exp:'expenses'};
  const type = typeMap[modalType];
  let item = {};

  if(modalType==='ws') item={name:g('name'),type:g('type'),contact:g('contact'),terms:g('terms'),region:g('region'),memo:g('memo')};
  else if(modalType==='del') item={date:g('date'),wholesaler:g('wholesaler'),artist:g('artist'),title:g('title'),format:g('format'),qty:Number(g('qty')),unitPrice:Number(g('unitPrice')),paid:g('paid'),memo:g('memo')};
  else if(modalType==='pay') item={date:g('date'),from:g('from'),title:g('title'),amount:Number(g('amount')),status:g('status'),dueDate:g('dueDate'),memo:g('memo')};
  else if(modalType==='inv') item={artist:g('artist'),title:g('title'),format:g('format'),total:Number(g('total')),returned:Number(g('returned'))||0,releaseDate:g('releaseDate'),barcode:g('barcode'),memo:g('memo')};
  else if(modalType==='exp') item={date:g('date'),category:g('category'),detail:g('detail'),amount:Number(g('amount')),paid:g('paid'),artist:g('artist'),title:g('title'),memo:g('memo')};

  if(modalId){
    const old = state[type].find(x=>x.id===modalId);
    item.id = modalId;
    if(old?.sourceDeliveryId) item.sourceDeliveryId = old.sourceDeliveryId;
    editLog.unshift({type, desc:`${JSON.stringify(old)} → ${JSON.stringify(item)}`, at:new Date().toLocaleString('ja-JP')});
    state[type] = state[type].map(x=>x.id===modalId?item:x);
  } else {
    item.id = nextId(state[type]);
    state[type].push(item);
  }
  save(); closeModal(); render();
  showToast(modalId?'保存しました ✓':'追加しました ✓');
}

function exportCSV(){
  let out = '';
  const sheets = {
    '卸先': state.wholesalers.map(w=>({名前:w.name,種別:w.type,連絡先:w.contact,支払条件:w.terms,地域:w.region})),
    '卸し履歴': state.deliveries.map(d=>({日付:d.date,卸先:d.wholesaler,アーティスト:d.artist,タイトル:d.title,形態:d.format,枚数:d.qty,単価:d.unitPrice,合計:d.qty*d.unitPrice,入金:d.paid?'済':'未'})),
    '入金売上': state.payments.map(p=>({日付:p.date,入金元:p.from,件名:p.title,金額:p.amount,状態:p.status,期限:p.dueDate||''})),
    '在庫': state.inventory.map(i=>({アーティスト:i.artist,タイトル:i.title,形態:i.format,製造数:i.total,返品:i.returned,在庫残:calcStock(i),発売日:i.releaseDate||'',バーコード:i.barcode||''})),
    '経費': state.expenses.map(e=>({日付:e.date,カテゴリ:e.category,内容:e.detail,金額:e.amount,支払:e.paid?'済':'未',アーティスト:e.artist||'',タイトル:e.title||''})),
  };
  Object.entries(sheets).forEach(([n,rows])=>{
    if(!rows.length) return;
    out+=`# ${n}\n`+Object.keys(rows[0]).join(',')+'\n'+rows.map(r=>Object.values(r).map(v=>`"${v}"`).join(',')).join('\n')+'\n\n';
  });
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\uFEFF'+out],{type:'text/csv;charset=utf-8;'}));
  a.download=`label_${TODAY}.csv`;a.click();
  showToast('CSVを保存しました ✓');
}

function exportJSON(){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify(state,null,2)],{type:'application/json'}));
  a.download=`label_backup_${TODAY}.json`;a.click();
  showToast('バックアップを保存しました ✓');
}

function importJSON(){
  const input=document.createElement('input');
  input.type='file';input.accept='.json';
  input.onchange=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const imp=JSON.parse(ev.target.result);
        if(!imp.wholesalers||!imp.inventory)throw new Error();
        snapshot(); state=imp; save(); render();
        showToast('データを読み込みました ✓');
      }catch{ showToast('JSONファイルが不正です','#ef4444'); }
    };
    reader.readAsText(file);
  };
  input.click();
}

render();
</script>
