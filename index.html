function loadStorage(){try{const v=localStorage.getItem(STORAGE_KEY);if(v)return JSON.parse(v);}catch(e){}return null;}
function saveStorage(data){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(data));}catch(e){}}

function useHistory(init){
  const[past,setPast]=useState([]);
  const[present,setPresent]=useState(init);
  const[loaded,setLoaded]=useState(false);
  const[trash,setTrash]=useState([]);
  const[editLog,setEditLog]=useState([]);
  useEffect(()=>{const saved=loadStorage();if(saved)setPresent(saved);setLoaded(true);},[]);
  const commit=useCallback((fn,log)=>{
    setPresent(prev=>{
      const next=typeof fn==="function"?fn(prev):fn;
      setPast(p=>[...p.slice(-49),prev]);
      if(log)setEditLog(l=>[{...log,at:new Date().toLocaleString("ja-JP")},...l.slice(0,99)]);
      saveStorage(next);
      return next;
    });
  },[]);
  const undo=useCallback(()=>{
    setPast(p=>{if(!p.length)return p;setPresent(p[p.length-1]);return p.slice(0,-1);});
  },[]);
  const softDelete=useCallback((type,id)=>{
    setPresent(prev=>{
      const item=prev[type].find(x=>x.id===id);if(!item)return prev;
      setTrash(t=>[{id:Date.now(),type,item,deletedAt:new Date().toLocaleString("ja-JP")},...t]);
      setPast(p=>[...p.slice(-49),prev]);
      const next={...prev,[type]:prev[type].filter(x=>x.id!==id)};
      saveStorage(next);return next;
    });
  },[]);
  const restore=useCallback(tid=>{
    setTrash(t=>{
      const entry=t.find(x=>x.id===tid);if(!entry)return t;
      setPresent(prev=>{
        setPast(p=>[...p.slice(-49),prev]);
        const next={...prev,[entry.type]:[...prev[entry.type],entry.item]};
        saveStorage(next);return next;
      });
      return t.filter(x=>x.id!==tid);
    });
  },[]);
  const emptyTrash=useCallback(tid=>{setTrash(t=>tid?t.filter(x=>x.id!==tid):[]);},[]);
  return{data:present,loaded,commit,undo,canUndo:past.length>0,trash,softDelete,restore,emptyTrash,editLog};
}

function useSort(dk,dd){
  const[sk,setSk]=useState(dk);
  const[sd,setSd]=useState(dd||"asc");
  const toggle=k=>{if(k===sk){setSd(d=>d==="asc"?"desc":"asc");}else{setSk(k);setSd("asc");}};
  const apply=(arr,numCols)=>{
    const nc=numCols||[];
    return[...arr].sort((a,b)=>{
      let av=a[sk],bv=b[sk];
      if(nc.includes(sk)){av=Number(av);bv=Number(bv);}
      if(av==null)return 1;if(bv==null)return-1;
      const c=typeof av==="number"?av-bv:String(av).localeCompare(String(bv),"ja");
      return sd==="asc"?c:-c;
    });
  };
  const SortTh=({k,children,style})=>(
    <th onClick={()=>toggle(k)} style={{textAlign:"left",padding:"9px 11px",background:"#1a1a24",color:sk===k?"#a855f7":"#777",fontWeight:600,borderBottom:"1px solid #2a2a3a",whiteSpace:"nowrap",cursor:"pointer",userSelect:"none",fontSize:12,...(style||{})}}>
      {children}<span style={{marginLeft:3,fontSize:10,opacity:sk===k?1:0.3}}>{sk===k?(sd==="asc"?"▲":"▼"):"⇅"}</span>
    </th>
  );
  return{apply,SortTh};
}

const Th=({children,style})=><th style={{textAlign:"left",padding:"9px 11px",background:"#1a1a24",color:"#777",fontWeight:600,borderBottom:"1px solid #2a2a3a",whiteSpace:"nowrap",fontSize:12,...(style||{})}}>{children}</th>;
const Td=({children,style})=><td style={{padding:"9px 11px",borderBottom:"1px solid #1e1e2a",verticalAlign:"middle",fontSize:13,...(style||{})}}>{children}</td>;
const Tbl=({children})=><div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse"}}>{children}</table></div>;
const Btn=({onClick,disabled,children,style})=><button onClick={onClick} disabled={disabled} style={{padding:"6px 13px",borderRadius:7,border:"none",cursor:disabled?"not-allowed":"pointer",background:"#2a2a3a",color:"#aaa",fontSize:12,fontWeight:600,...(style||{})}}>{children}</button>;

function filterRows(rows,search,keys){
  if(!search)return rows;
  const q=search.toLowerCase();
  return rows.filter(r=>keys.some(k=>String(r[k]||"").toLowerCase().includes(q)));
}

function descItem(type,item){
  if(!item)return"-";
  if(type==="wholesalers")return`${item.name}（${item.type}）`;
  if(type==="deliveries")return`${item.date} ${item.wholesaler}/${item.artist}-${item.title} ${item.format} ${fmt(item.qty)}枚`;
  if(type==="payments")return`${item.date} ${item.from}/${item.title} ¥${fmt(item.amount)} ${item.status}`;
  if(type==="inventory")return`${item.artist}/${item.title} ${item.format} 製造${fmt(item.total)}枚`;
  if(type==="expenses")return`${item.date} ${item.category}/${item.detail} ¥${fmt(item.amount)}`;
  return JSON.stringify(item);
}

function exportCSV(data){
  const sheets={
    "卸先":data.wholesalers.map(w=>({名前:w.name,種別:w.type,連絡先:w.contact,支払条件:w.terms,地域:w.region})),
    "卸し履歴":data.deliveries.map(d=>({日付:d.date,卸先:d.wholesaler,アーティスト:d.artist,タイトル:d.title,形態:d.format,枚数:d.qty,単価:d.unitPrice,合計:d.qty*d.unitPrice,入金:d.paid?"済":"未"})),
    "入金売上":data.payments.map(p=>({日付:p.date,入金元:p.from,件名:p.title,金額:p.amount,状態:p.status,期限:p.dueDate||""})),
    "在庫":data.inventory.map(i=>({アーティスト:i.artist,タイトル:i.title,形態:i.format,製造数:i.total,返品:i.returned,発売日:i.releaseDate||"",バーコード:i.barcode||""})),
    "経費":data.expenses.map(e=>({日付:e.date,カテゴリ:e.category,内容:e.detail,金額:e.amount,支払:e.paid?"済":"未",アーティスト:e.artist||"",タイトル:e.title||""})),
  };
  let out="";
  Object.entries(sheets).forEach(([n,rows])=>{
    if(!rows.length)return;
    out+=`# ${n}\n`+Object.keys(rows[0]).join(",")+"\n"+rows.map(r=>Object.values(r).map(v=>`"${v}"`).join(",")).join("\n")+"\n\n";
  });
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob(["\uFEFF"+out],{type:"text/csv;charset=utf-8;"}));
  a.download=`label_${TODAY}.csv`;a.click();
}

function App(){
  const[tab,setTab]=useState(0);
  const{data,loaded,commit,undo,canUndo,trash,softDelete,restore,emptyTrash,editLog}=useHistory(SEED);
  const[modal,setModal]=useState(null);
  const[toast,setToast]=useState(null);
  const[search,setSearch]=useState("");
  const showToast=(msg,c)=>{setToast({msg,c:c||"#22c55e"});setTimeout(()=>setToast(null),2500);};
  const addItem=(type,item)=>{
    const id=Math.max(0,...data[type].map(x=>x.id))+1;
    commit(d=>({...d,[type]:[...d[type],{...item,id}]}));
    showToast("追加しました ✓");
  };
  const updateItem=(type,before,after)=>{
    commit(d=>({...d,[type]:d[type].map(x=>x.id===after.id?after:x)}),{type,before,after});
    showToast("保存しました ✓");
  };
  const deleteItem=(type,id)=>{softDelete(type,id);showToast("ゴミ箱に移動しました","#f59e0b");};
  const togglePaid=id=>{
    const b=data.deliveries.find(x=>x.id===id);
    const a={...b,paid:!b.paid};
    commit(d=>({...d,deliveries:d.deliveries.map(x=>x.id===id?a:x)}),{type:"deliveries",before:b,after:a});
  };
  const exportJSON=()=>{
    const a=document.createElement("a");
    a.href=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:"application/json"}));
    a.download=`label_backup_${TODAY}.json`;a.click();
    showToast("JSONバックアップを保存しました ✓");
  };
  const importJSON=()=>{
    const input=document.createElement("input");
    input.type="file";input.accept=".json";
    input.onchange=e=>{
      const file=e.target.files[0];if(!file)return;
      const reader=new FileReader();
      reader.onload=ev=>{
        try{
          const imp=JSON.parse(ev.target.result);
          if(!imp.wholesalers||!imp.inventory)throw new Error();
          commit(()=>imp);showToast("データを読み込みました ✓");
        }catch{showToast("JSONファイルが不正です","#ef4444");}
      };
      reader.readAsText(file);
    };
    input.click();
  };
  const totalIncome=data.payments.filter(p=>p.status==="入金済").reduce((s,p)=>s+Number(p.amount),0);
  const pendingIncome=data.payments.filter(p=>p.status!=="入金済").reduce((s,p)=>s+Number(p.amount),0);
  const totalExpense=data.expenses.reduce((s,e)=>s+Number(e.amount),0);
  const profit=totalIncome-totalExpense;
  const totalStock=data.inventory.reduce((s,i)=>{
    const d=data.deliveries.filter(x=>x.title===i.title&&x.format===i.format).reduce((ss,x)=>ss+Number(x.qty),0);
    return s+(Number(i.total)-d+Number(i.returned));
  },0);
  const overdue=data.payments.filter(p=>p.status!=="入金済"&&p.dueDate&&p.dueDate<TODAY).length;
  const unpaidExp=data.expenses.filter(e=>!e.paid).length;
  const badge=i=>{if(i===7&&trash.length>0)return trash.length;if(i===3&&overdue>0)return overdue;if(i===5&&unpaidExp>0)return unpaidExp;return null;};
  if(!loaded)return(
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:"#0f0f13",color:"#888",fontSize:14,gap:10,flexDirection:"column"}}>
      <div style={{width:24,height:24,border:"2px solid #a855f7",borderTopColor:"transparent",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>
      <span>データを読み込み中...</span>
    </div>
  );
  return(
    <div style={{fontFamily:"sans-serif",background:"#0f0f13",minHeight:"100vh",color:"#e8e8f0"}}>
      <div style={{background:"#1a1a24",borderBottom:"1px solid #2a2a3a",padding:"11px 18px",display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
        <div style={{width:32,height:32,borderRadius:"50%",background:"linear-gradient(135deg,#a855f7,#ec4899)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>🎵</div>
        <span style={{fontWeight:700,fontSize:16,letterSpacing:1}}>Label Manager</span>
        <div style={{flex:1,maxWidth:280,position:"relative"}}>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="全体を検索..." style={{width:"100%",padding:"6px 10px 6px 28px",background:"#0f0f13",border:"1px solid #2a2a3a",borderRadius:8,color:"#e8e8f0",fontSize:12,boxSizing:"border-box"}}/>
          <span style={{position:"absolute",left:9,top:"50%",transform:"translateY(-50%)",color:"#555",fontSize:12}}>🔍</span>
        </div>
        <div style={{marginLeft:"auto",display:"flex",gap:6,flexWrap:"wrap"}}>
          <Btn onClick={undo} disabled={!canUndo} style={{color:canUndo?"#a855f7":"#444",background:canUndo?"#2a2a3a":"#1a1a24"}}>↩ 元に戻す</Btn>
          <Btn onClick={()=>exportCSV(data)}>⬇ CSV</Btn>
          <Btn onClick={exportJSON} style={{color:"#38bdf8"}}>💾 バックアップ</Btn>
          <Btn onClick={importJSON} style={{color:"#22c55e"}}>📂 復元</Btn>
        </div>
      </div>
      <div style={{display:"flex",gap:1,padding:"10px 18px 0",borderBottom:"1px solid #2a2a3a",background:"#15151f",flexWrap:"wrap"}}>
        {TABS.map((t,i)=>{
          const b=badge(i);
          return<button key={i} onClick={()=>setTab(i)} style={{padding:"7px 13px",border:"none",borderRadius:"6px 6px 0 0",cursor:"pointer",fontSize:12,fontWeight:600,background:tab===i?(i===7?"#b45309":"#a855f7"):"transparent",color:tab===i?"#fff":i===7?"#f59e0b":"#888",transition:"all .15s",position:"relative"}}>
            {t}{b?<span style={{position:"absolute",top:3,right:2,background:"#ef4444",borderRadius:"50%",width:14,height:14,fontSize:9,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:700}}>{b}</span>:null}
          </button>;
        })}
      </div>
      <div style={{padding:18}}>
        {tab===0&&<Dashboard data={data} totalIncome={totalIncome} pendingIncome={pendingIncome} totalExpense={totalExpense} profit={profit} totalStock={totalStock} overdue={overdue} onTab={setTab}/>}
        {tab===1&&<WholesalerTab data={data.wholesalers} deliveries={data.deliveries} onAdd={()=>setModal({t:"ws"})} onEdit={item=>setModal({t:"ws",item})} onDelete={id=>deleteItem("wholesalers",id)} search={search}/>}
        {tab===2&&<DeliveryTab data={data.deliveries} wholesalers={data.wholesalers} inventory={data.inventory} onAdd={()=>setModal({t:"del"})} onEdit={item=>setModal({t:"del",item})} onDelete={id=>deleteItem("deliveries",id)} togglePaid={togglePaid} search={search}/>}
        {tab===3&&<PaymentTab data={data.payments} onAdd={()=>setModal({t:"pay"})} onEdit={item=>setModal({t:"pay",item})} onDelete={id=>deleteItem("payments",id)} search={search}/>}
        {tab===4&&<InventoryTab data={data.inventory} deliveries={data.deliveries} onAdd={()=>setModal({t:"inv"})} onEdit={item=>setModal({t:"inv",item})} onDelete={id=>deleteItem("inventory",id)} search={search}/>}
        {tab===5&&<ExpenseTab data={data.expenses} onAdd={()=>setModal({t:"exp"})} onEdit={item=>setModal({t:"exp",item})} onDelete={id=>deleteItem("expenses",id)} search={search}/>}
        {tab===6&&<AnalysisTab data={data}/>}
        {tab===7&&<TrashTab trash={trash} editLog={editLog} onRestore={id=>{restore(id);showToast("復元しました ✓");}} onDelete={emptyTrash}/>}
      </div>
      {modal&&<ModalForm modal={modal} onClose={()=>setModal(null)} data={data} onSave={(type,item,before)=>{before?updateItem(type,before,item):addItem(type,item);setModal(null);}}/>}
      {toast&&<div style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",background:toast.c,color:"#fff",padding:"9px 22px",borderRadius:10,fontWeight:700,fontSize:13,zIndex:200,boxShadow:"0 4px 18px #0007",whiteSpace:"nowrap"}}>{toast.msg}</div>}
    </div>
  );
}

function Dashboard({data,totalIncome,pendingIncome,totalExpense,profit,totalStock,overdue,onTab}){
  const unpaidDel=data.deliveries.filter(d=>!d.paid);
  const unpaidAmt=unpaidDel.reduce((s,d)=>s+d.qty*d.unitPrice,0);
  const expByCat=EXPENSE_CATS.map(c=>({c,v:data.expenses.filter(e=>e.category===c).reduce((s,e)=>s+Number(e.amount),0)})).filter(x=>x.v>0);
  const maxExp=Math.max(...expByCat.map(x=>x.v),1);
  const titleQty={};
  data.deliveries.forEach(d=>{const k=`${d.artist} / ${d.title}`;titleQty[k]=(titleQty[k]||0)+Number(d.qty);});
  const topTitles=Object.entries(titleQty).sort((a,b)=>b[1]-a[1]).slice(0,4);
  const lowStock=data.inventory.filter(i=>{
    const d=data.deliveries.filter(x=>x.title===i.title&&x.format===i.format).reduce((s,x)=>s+Number(x.qty),0);
    return(Number(i.total)-d+Number(i.returned))<30;
  });
  const cards=[
    {t:"入金済",v:`¥${fmt(totalIncome)}`,sub:"確定売上",c:"#a855f7",tab:3},
    {t:"未入金",v:`¥${fmt(pendingIncome)}`,sub:overdue>0?`${overdue}件延滞あり`:"請求中",c:overdue>0?"#ef4444":"#f59e0b",tab:3},
    {t:"卸し未回収",v:`¥${fmt(unpaidAmt)}`,sub:`${unpaidDel.length}件`,c:"#f97316",tab:2},
    {t:"経費合計",v:`¥${fmt(totalExpense)}`,c:"#ef4444",tab:5},
    {t:"収支",v:`¥${fmt(profit)}`,sub:profit>=0?"黒字":"赤字",c:profit>=0?"#22c55e":"#ef4444",tab:6},

function AnalysisTab({data}){
  const[view,setView]=useState("title");
  const artists=[];
  data.inventory.forEach(i=>{if(i.artist&&!artists.includes(i.artist))artists.push(i.artist);});
  const titleKeys=[];
  data.inventory.forEach(i=>{
    const k=`${i.artist}__${i.title}`;
    if(!titleKeys.find(x=>x.k===k))titleKeys.push({k,artist:i.artist,title:i.title});
  });
  const byTitle=titleKeys.map(({k,artist,title})=>{
    const delPaid=data.deliveries.filter(d=>d.paid&&d.title===title&&d.artist===artist).reduce((s,d)=>s+d.qty*d.unitPrice,0);
    const delAmt=data.deliveries.filter(d=>d.title===title&&d.artist===artist).reduce((s,d)=>s+d.qty*d.unitPrice,0);
    const delQty=data.deliveries.filter(d=>d.title===title&&d.artist===artist).reduce((s,d)=>s+Number(d.qty),0);
    const expense=data.expenses.filter(e=>e.title===title&&e.artist===artist).reduce((s,e)=>s+Number(e.amount),0);
    return{k,artist,title,delPaid,delAmt,delQty,expense,profit:delPaid-expense};
  });
  const byArtist=artists.map(artist=>{
    const delPaid=data.deliveries.filter(d=>d.paid&&d.artist===artist).reduce((s,d)=>s+d.qty*d.unitPrice,0);
    const delAmt=data.deliveries.filter(d=>d.artist===artist).reduce((s,d)=>s+d.qty*d.unitPrice,0);
    const delQty=data.deliveries.filter(d=>d.artist===artist).reduce((s,d)=>s+Number(d.qty),0);
    const expense=data.expenses.filter(e=>e.artist===artist).reduce((s,e)=>s+Number(e.amount),0);
    return{k:artist,artist,title:"",delPaid,delAmt,delQty,expense,profit:delPaid-expense};
  });
  const rows=view==="title"?byTitle:byArtist;
  const maxAmt=Math.max(...rows.map(r=>Math.max(r.delPaid,r.expense)),1);
  return(
    <div>
      <SectionHeader title={<div style={{display:"flex",gap:8}}>{["title","artist"].map(v=><button key={v} onClick={()=>setView(v)} style={{padding:"5px 14px",border:"none",borderRadius:6,cursor:"pointer",fontSize:12,fontWeight:600,background:view===v?"#a855f7":"#2a2a3a",color:view===v?"#fff":"#888"}}>{v==="title"?"作品別":"アーティスト別"}</button>)}</div>} right={null}/>
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {rows.map(r=>{
          const name=view==="title"?`${r.artist} / ${r.title}`:r.artist;
          return(
            <div key={r.k} style={{background:"#1a1a24",border:"1px solid #2a2a3a",borderRadius:10,padding:"14px 16px"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10,flexWrap:"wrap",gap:6}}>
                <div><div style={{fontWeight:700,fontSize:13,color:"#e8e8f0",marginBottom:2}}>{name}</div><div style={{fontSize:11,color:"#666"}}>卸し総数 {fmt(r.delQty)}枚 ／ 卸し金額 ¥{fmt(r.delAmt)}</div></div>
                <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
                  <div style={{textAlign:"right"}}><div style={{fontSize:10,color:"#777"}}>売上（回収済）</div><div style={{fontSize:15,fontWeight:700,color:"#a855f7"}}>¥{fmt(r.delPaid)}</div></div>
                  <div style={{textAlign:"right"}}><div style={{fontSize:10,color:"#777"}}>経費</div><div style={{fontSize:15,fontWeight:700,color:"#ef4444"}}>¥{fmt(r.expense)}</div></div>
                  <div style={{textAlign:"right"}}><div style={{fontSize:10,color:"#777"}}>収支</div><div style={{fontSize:15,fontWeight:700,color:r.profit>=0?"#22c55e":"#ef4444"}}>¥{fmt(r.profit)}</div></div>
                </div>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:5}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:11,color:"#888",width:60,flexShrink:0}}>売上</span><div style={{flex:1,background:"#2a2a3a",borderRadius:3,height:5}}><div style={{width:`${Math.min((r.delPaid/maxAmt)*100,100)}%`,background:"#a855f7",borderRadius:3,height:5}}/></div></div>
                <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:11,color:"#888",width:60,flexShrink:0}}>経費</span><div style={{flex:1,background:"#2a2a3a",borderRadius:3,height:5}}><div style={{width:`${Math.min((r.expense/maxAmt)*100,100)}%`,background:"#ef4444",borderRadius:3,height:5}}/></div></div>
              </div>
            </div>
          );
        })}
        {rows.length===0&&<Empty text="データがありません"/>}
      </div>
    </div>
  );
}

            <div key={t.id} style={{background:"#1a1a24",border:"1px solid #2a2a3a",borderRadius:9,padding:"11px 14px",display:"flex",alignItems:"center",gap:10}}>
              <div style={{flex:1}}><div style={{display:"flex",gap:7,alignItems:"center",marginBottom:4}}><Badge bg="#2a1a00" color="#f59e0b">{TYPE_LABELS[t.type]}</Badge><span style={{fontSize:11,color:"#555"}}>{t.deletedAt}</span></div><div style={{fontSize:12,color:"#bbb"}}>{descItem(t.type,t.item)}</div></div>
              <div style={{display:"flex",gap:5}}><Btn onClick={()=>onRestore(t.id)} style={{background:"#14532d",color:"#22c55e",fontSize:11}}>復元</Btn><Btn onClick={()=>onDelete(t.id)} style={{background:"#3a1a1a",color:"#ef4444",fontSize:11}}>完全削除</Btn></div>
            </div>
          ))}
        </div>
      )}
      {v==="log"&&(editLog.length===0?<Empty text="編集履歴はありません"/>:
        <Tbl><thead><tr>{["日時","種別","変更前","変更後"].map(h=><Th key={h}>{h}</Th>)}</tr></thead>
          <tbody>{editLog.map((e,i)=>(
            <tr key={i}><Td style={{color:"#555",whiteSpace:"nowrap",fontSize:11}}>{e.at}</Td><Td><Badge bg="#1e1a2a" color="#a855f7">{TYPE_LABELS[e.type]}</Badge></Td><Td style={{color:"#ef4444",fontSize:11}}>{descItem(e.type,e.before)}</Td><Td style={{color:"#22c55e",fontSize:11}}>{descItem(e.type,e.after)}</Td></tr>
          ))}</tbody>
        </Tbl>
      )}
    </div>
  );
}

function ModalForm({modal,onClose,data,onSave}){
  const{t,item}=modal;
  const artists=[];
  data.inventory.forEach(i=>{if(i.artist&&!artists.includes(i.artist))artists.push(i.artist);});
  const artistTitles={};
  data.inventory.forEach(i=>{
    if(i.artist){
      if(!artistTitles[i.artist])artistTitles[i.artist]=[];
      if(!artistTitles[i.artist].includes(i.title))artistTitles[i.artist].push(i.title);
    }
  });
  const defaults={
    ws:{name:"",type:WS_TYPES[0],contact:"",terms:"",region:"国内",memo:""},
    del:{date:TODAY,wholesaler:data.wholesalers[0]?.name||"",artist:artists[0]||"",title:"",format:FORMATS[0],qty:"",unitPrice:"",paid:false,memo:""},
    pay:{date:TODAY,from:data.wholesalers[0]?.name||"",title:"",amount:"",status:PAY_STATUS[0],dueDate:"",memo:""},
    inv:{artist:"",title:"",format:FORMATS[0],total:"",returned:"0",releaseDate:"",barcode:"",memo:""},
    exp:{date:TODAY,category:EXPENSE_CATS[0],detail:"",amount:"",paid:false,artist:"",title:"",memo:""},
  };
  const[form,setForm]=useState(item?{...item}:defaults[t]);
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const titlesForArtist=artistTitles[form.artist]||[];
  const typeMap={ws:"wholesalers",del:"deliveries",pay:"payments",inv:"inventory",exp:"expenses"};
  const labelMap={ws:"卸先",del:"卸し履歴",pay:"入金・売上",inv:"在庫",exp:"経費"};
  return(
    <div style={{position:"fixed",inset:0,background:"#000b",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100}} onClick={onClose}>
      <div style={{background:"#1a1a24",border:"1px solid #2a2a3a",borderRadius:13,padding:24,width:420,maxWidth:"95vw",maxHeight:"90vh",overflowY:"auto"}} onClick={e=>e.stopPropagation()}>
        <h3 style={{margin:"0 0 16px",fontSize:14}}>{item?"編集":"追加"} — {labelMap[t]}</h3>
        {t==="ws"&&<><MF l="卸先名" k="name" form={form} set={set}/><MS l="種別" k="type" form={form} set={set} opts={WS_TYPES}/><MF l="地域" k="region" form={form} set={set}/><MF l="連絡先" k="contact" form={form} set={set}/><MF l="支払条件" k="terms" form={form} set={set}/><MF l="メモ" k="memo" form={form} set={set}/></>}
        {t==="del"&&<>
          <MF l="卸し日" k="date" form={form} set={set} type="date"/>
          <MS l="卸先" k="wholesaler" form={form} set={set} opts={data.wholesalers.map(w=>w.name)}/>
          <MS l="アーティスト" k="artist" form={form} set={set} opts={artists} onChange={v=>{set("artist",v);set("title","");}}/>
          <MS l="タイトル" k="title" form={form} set={set} opts={titlesForArtist.length?titlesForArtist:["（先にアーティストを選択）"]}/>
          <MS l="形態" k="format" form={form} set={set} opts={FORMATS}/>
          <MF l="枚数" k="qty" form={form} set={set} type="number"/>
          <MF l="単価（円）" k="unitPrice" form={form} set={set} type="number"/>
          <MCB l="入金済み" k="paid" form={form} set={set} color="#22c55e"/>
          <MF l="メモ" k="memo" form={form} set={set}/>
        </>}
        {t==="pay"&&<>
          <MF l="日付" k="date" form={form} set={set} type="date"/>
          <MS l="入金元" k="from" form={form} set={set} opts={data.wholesalers.map(w=>w.name)}/>
          <MF l="件名" k="title" form={form} set={set}/>
          <MF l="金額（円）" k="amount" form={form} set={set} type="number"/>
          <MS l="ステータス" k="status" form={form} set={set} opts={PAY_STATUS}/>
          <MF l="入金期限" k="dueDate" form={form} set={set} type="date"/>
          <MF l="メモ" k="memo" form={form} set={set}/>
        </>}
        {t==="inv"&&<>
          <MF l="アーティスト名" k="artist" form={form} set={set}/>
          <MF l="タイトル" k="title" form={form} set={set}/>
          <MS l="形態" k="format" form={form} set={set} opts={FORMATS}/>
          <MF l="発売日" k="releaseDate" form={form} set={set} type="date"/>
          <MF l="製造数" k="total" form={form} set={set} type="number"/>
          <MF l="返品数" k="returned" form={form} set={set} type="number"/>
          <MF l="バーコード（JAN等）" k="barcode" form={form} set={set}/>
          <MF l="メモ" k="memo" form={form} set={set}/>
        </>}
        {t==="exp"&&<>
          <MF l="日付" k="date" form={form} set={set} type="date"/>
          <MS l="カテゴリ" k="category" form={form} set={set} opts={EXPENSE_CATS}/>
          <MF l="内容" k="detail" form={form} set={set}/>
          <MF l="金額（円）" k="amount" form={form} set={set} type="number"/>
          <MCB l="支払済み" k="paid" form={form} set={set} color="#22c55e"/>
          <div style={{marginBottom:12,padding:"10px 12px",background:"#13131a",borderRadius:8,border:"1px solid #2a2a3a"}}>
            <div style={{fontSize:11,color:"#777",marginBottom:8}}>関連作品（任意）</div>
            <MS l="アーティスト" k="artist" form={form} set={set} opts={["（未設定）",...artists]} onChange={v=>{set("artist",v==="（未設定）"?"":v);set("title","");}}/>
            <MS l="タイトル" k="title" form={form} set={set} opts={["（未設定）",...(artistTitles[form.artist]||[])]}/>
          </div>
          <MF l="メモ" k="memo" form={form} set={set}/>
        </>}
        <div style={{display:"flex",gap:7,justifyContent:"flex-end",marginTop:16}}>
          <Btn onClick={onClose}>キャンセル</Btn>
          <Btn onClick={()=>onSave(typeMap[t],form,item||null)} style={{background:"#a855f7",color:"#fff"}}>保存</Btn>
        </div>
      </div>
    </div>
  );
}

const inpS={width:"100%",padding:"7px 10px",background:"#0f0f13",border:"1px solid #2a2a3a",borderRadius:7,color:"#e8e8f0",fontSize:12,boxSizing:"border-box"};
function MF({l,k,form,set,type}){return<div style={{marginBottom:11}}><label style={{display:"block",fontSize:11,color:"#888",marginBottom:3}}>{l}</label><input type={type||"text"} value={form[k]||""} onChange={e=>set(k,e.target.value)} style={inpS}/></div>;}
function MS({l,k,form,set,opts,onChange}){return<div style={{marginBottom:11}}><label style={{display:"block",fontSize:11,color:"#888",marginBottom:3}}>{l}</label><select value={form[k]||""} onChange={e=>{const v=e.target.value;onChange?onChange(v):set(k,v);}} style={inpS}>{(opts||[]).map(o=><option key={o} value={o}>{o}</option>)}</select></div>;}
function MCB({l,k,form,set,color}){return<div style={{marginBottom:11}}><label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",fontSize:12}}><input type="checkbox" checked={!!form[k]} onChange={e=>set(k,e.target.checked)} style={{width:14,height:14,accentColor:color||"#a855f7"}}/><span style={{color:form[k]?(color||"#a855f7"):"#888"}}>{l}</span></label></div>;}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
